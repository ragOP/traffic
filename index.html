<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic — Verbraucher Fokus Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f8fc;
      color: #0f1c2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border: 1px solid #e3e9f0;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 6px 24px rgba(15, 28, 46, 0.08);
    }
    h1 { font-size: 1.35rem; margin-bottom: 8px; }
    p { color: #697789; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block;
      padding: 14px 18px;
      background: #0b6cb8;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      text-align: center;
      transition: background 0.15s;
    }
    a:hover { background: #06548f; }
    a.secondary { background: #eef4fb; color: #0b6cb8; }
    a.secondary:hover { background: #e3e9f0; }
  </style>
</head>
<body>
  <main>
    <h1>Traffic</h1>
    <p>Verbraucher Fokus Test — Landing pages</p>
    <ul>
      <li><a href="/altv2/">Altuva Vergleich (v2)</a></li>
      <li><a class="secondary" href="/altuva/">Altuva Advertorial (DE)</a></li>
    </ul>
  </main>
</body>
</html>
