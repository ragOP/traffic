<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic — NL Landing Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f6f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 440px;
      width: 100%;
      background: #fff;
      border: 1px solid #e8e4dc;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
    }
    h1 { font-size: 1.35rem; margin-bottom: 8px; }
    p { color: #666; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block;
      padding: 14px 18px;
      background: #1a5c4a;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      text-align: center;
      transition: background 0.15s;
    }
    a:hover { background: #134a3b; }
    a.secondary { background: #eef5f2; color: #1a5c4a; }
    a.secondary:hover { background: #dceee8; }
  </style>
</head>
<body>
  <main>
    <h1>Traffic</h1>
    <p>NL vergelijkingspagina’s</p>
    <ul>
      <li><a href="/berberine-pleisters-vergelijken/">Berberine pleisters vergelijken</a></li>
      <li><a class="secondary" href="/afslankpleisters-vergelijken/">Afslankpleisters vergelijken</a></li>
    </ul>
  </main>
</body>
</html>
